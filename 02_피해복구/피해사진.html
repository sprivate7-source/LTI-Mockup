<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTI 목업 — 피해사진</title>
  <link rel="stylesheet" href="../common/style.css">
  <link rel="stylesheet" href="../common/tab-bar.css">
  <style>
    /* --- 사진 카드 --- */
    #photo-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .photo-card {
      background: white;
      border-radius: 10px;
      border: 1.5px solid var(--gray-200);
      overflow: hidden;
    }
    .photo-card-img {
      width: 100%;
      height: 140px;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .photo-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-placeholder-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    /* 타임스탬프 오버레이 */
    .photo-timestamp {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      padding: 16px 6px 4px;
      color: white;
      font-size: 0.5625rem;
      font-family: monospace;
      line-height: 1.4;
    }
    .photo-timestamp-line {
      display: flex;
      justify-content: space-between;
    }
    /* 화살표 표시 아이콘 */
    .photo-annotate-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 0.625rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .photo-annotate-btn:active {
      background: rgba(0,0,0,0.7);
    }
    .photo-annotate-btn.has-annotation {
      background: var(--primary);
    }
    /* 화살표 주석 오버레이 */
    .photo-annotation-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .annotation-arrow {
      position: absolute;
      color: #ff3b30;
      font-size: 2rem;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
      transform: rotate(-45deg);
    }
    /* 코멘트 영역의 화살표 설명 */
    .annotation-comment {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      padding: 6px 8px;
      background: #fff5f5;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.6875rem;
      color: #c0392b;
      line-height: 1.3;
    }
    .annotation-comment svg {
      flex-shrink: 0;
      margin-top: 2px;
    }
    /* 코멘트 영역 */
    .photo-card-body {
      padding: 8px 10px;
    }
    .photo-comment-input {
      width: 100%;
      border: none;
      font-size: 0.75rem;
      color: var(--gray-700);
      background: none;
      resize: none;
      line-height: 1.4;
      outline: none;
    }
    .photo-comment-input::placeholder {
      color: var(--gray-400);
    }
    .photo-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 8px;
    }
    .photo-meta {
      font-size: 0.625rem;
      color: var(--gray-400);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .photo-delete-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 0.625rem;
      font-weight: 600;
      cursor: pointer;
      padding: 2px 4px;
    }

    /* --- 화살표 주석 모달 --- */
    .annotate-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      flex-direction: column;
    }
    .annotate-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      color: white;
    }
    .annotate-header-title {
      font-size: 1rem;
      font-weight: 600;
    }
    .annotate-close {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 1.25rem;
      cursor: pointer;
    }
    .annotate-canvas {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 0 16px;
      cursor: crosshair;
    }
    .annotate-canvas-img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
    }
    .annotate-hint {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8125rem;
    }
    .annotate-bottom {
      padding: 16px 20px;
    }
    .annotate-comment-row {
      display: flex;
      gap: 10px;
    }
    .annotate-comment-input {
      flex: 1;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-size: 0.9375rem;
      background: rgba(255,255,255,0.15);
      color: white;
    }
    .annotate-comment-input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    .annotate-save-btn {
      min-height: 44px;
      padding: 0 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <a href="보험처리.html" class="header-back" aria-label="뒤로가기">&#8249;</a>
    <div class="header-title">아랫집 피해복구</div>
    <div class="header-action"></div>
  </div>

  <!-- 탭 바 -->
  <div class="tab-bar" id="tab-bar"></div>
  <div class="sub-tab-bar" id="sub-tab-bar"></div>

  <!-- 페이지 콘텐츠 -->
  <div class="page-tab has-sub-tabs">

    <!-- 안내 -->
    <div class="alert alert-success mb-12">
      <strong>기존 현장 "피해 사진"에서 자동으로 가져왔습니다.</strong><br>
      동일한 사진을 다시 등록할 필요 없이, 추가 사진만 올리세요.
    </div>
    <div class="alert alert-info mb-16">
      <strong>사진은 많을수록 유리합니다.</strong> 피해현장 → 공사 중 → 완료까지 시간순으로 기록하세요.
    </div>

    <!-- 사진 등록 버튼 -->
    <div style="display:flex; gap:10px; margin-bottom:20px;">
      <button class="btn btn-primary" style="flex:1;" onclick="addDemoPhoto('camera')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        촬영
      </button>
      <button class="btn btn-outline" style="flex:1;" onclick="addDemoPhoto('gallery')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        갤러리/파일
      </button>
    </div>

    <!-- 등록된 사진 수 -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
      <span style="font-size:1rem; font-weight:700; color:var(--gray-800);">등록된 사진 (<span id="photo-count">0</span>장)</span>
      <span style="font-size:0.8125rem; color:var(--gray-500);" id="photo-hint">사진을 등록해주세요</span>
    </div>

    <!-- 사진 목록 -->
    <div id="photo-list"></div>

    <!-- 빈 상태 -->
    <div id="photo-empty" style="text-align:center; padding:60px 20px; color:var(--gray-400);">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <div style="font-size:1rem;">아직 등록된 사진이 없습니다</div>
      <div style="font-size:0.875rem; margin-top:4px;">촬영 또는 갤러리에서 사진을 추가하세요</div>
    </div>

  </div>

  <script src="../common/components.js"></script>
  <script src="../common/tab-bar.js"></script>
  <script>
    // 탭 바 렌더링
    renderTabBar('approval', '피해사진');

    // 서브탭 클릭 시 보험처리.html로 이동
    function onSubTabClick(sub) {
      if (sub === '피해사진') return; // 현재 페이지
      window.location.href = '보험처리.html'; // 보험처리 페이지로 이동
    }

    // 기능 패널
    LTI.renderFeaturePanel({
      target: '.page-tab',
      features: [
        { text: '기존 현장의 "피해 사진" 그룹에서 자동 복사 — 같은 사진 두 번 안 올림' },
        { text: '자동 복사된 사진은 LTI 별도 컬렉션으로 저장 (원본 건드리지 않음)' },
        { text: '추가 촬영 — 태블릿 카메라로 직접 촬영 (서버 업로드 + 갤러리 자동 저장)' },
        { text: '갤러리/파일 — 핸드폰에서 찍은 사진을 태블릿에서 불러와 등록' },
        { text: '피해현장 ~ 공사완료까지 모든 단계 사진을 시간순으로 통합 관리' },
        { text: '메타데이터 원본 보존 — 촬영일시, GPS 등 EXIF 데이터 변형 없이 유지' },
        { text: '타임스탬프 오버레이 — 촬영일시 + GPS좌표 + LTI Certified + 소스(Auto-Copy/Tablet/Import)' },
        { text: '기본 코멘트 — 각 사진에 설명 텍스트 입력 (권장)' },
        { text: '[옵션] 화살표 표시 — 사진 위에 부위를 화살표로 지시 + 설명 입력 + 제거 가능' },
        { text: '사진 삭제 — 개별 사진 삭제 가능 (확인 후 삭제)' },
        { text: '소스 구분 표시 — 자동복사/태블릿촬영/외부파일을 카드에 표시' },
      ],
    });

    // ===== 피해사진 기능 =====
    // 기존 현장에서 자동 복사된 피해 사진 (초기 상태)
    const photos = [
      {
        id: 1, source: 'auto', timestamp: '2026.04.08 09:15:30',
        gps: '37.4979°N, 127.0276°E', color: '#d4b8a8',
        label: '[자동] 화장실 천장 누수 흔적',
        comment: '화장실 천장 물얼룩 및 페인트 벗겨짐 (기존 현장에서 복사)',
        annotation: null,
      },
      {
        id: 2, source: 'auto', timestamp: '2026.04.08 09:16:45',
        gps: '37.4979°N, 127.0276°E', color: '#c8b8a0',
        label: '[자동] 거실 벽지 곰팡이',
        comment: '거실 벽면 하단 곰팡이 발생 (기존 현장에서 복사)',
        annotation: null,
      },
    ];
    let photoIdCounter = 2;

    const DEMO_TIMESTAMPS = [
      { date: '2026.04.08 09:32:15', gps: '37.4979°N, 127.0276°E' },
      { date: '2026.04.08 09:33:42', gps: '37.4979°N, 127.0276°E' },
      { date: '2026.04.08 09:35:08', gps: '37.4979°N, 127.0276°E' },
    ];

    const DEMO_COLORS = ['#e8d4b8','#c8b898','#b09878'];
    const DEMO_LABELS = ['바닥 마루 부풀어 오름','천장 석고보드 변색','몰딩 이음새 수분 침투'];

    function addDemoPhoto(source) {
      const addIdx = photos.length - 2; // 자동복사 2장 제외
      if (addIdx >= 3) {
        LTI.toast('데모는 추가 3장까지 지원합니다');
        return;
      }
      const ts = DEMO_TIMESTAMPS[addIdx];
      const photo = {
        id: ++photoIdCounter,
        source: source,
        timestamp: ts.date,
        gps: ts.gps,
        color: DEMO_COLORS[addIdx],
        label: DEMO_LABELS[addIdx],
        comment: '',
        annotation: null,
      };
      photos.push(photo);
      renderPhotos();
      LTI.toast((source === 'camera' ? '촬영' : '갤러리') + ' 사진이 등록되었습니다');
    }

    function deletePhoto(id) {
      const idx = photos.findIndex(p => p.id === id);
      if (idx >= 0) {
        photos.splice(idx, 1);
        renderPhotos();
        LTI.toast('사진이 삭제되었습니다');
      }
    }

    function updateComment(id, text) {
      const photo = photos.find(p => p.id === id);
      if (photo) photo.comment = text;
    }

    function renderPhotos() {
      const list = document.getElementById('photo-list');
      const empty = document.getElementById('photo-empty');
      const count = document.getElementById('photo-count');
      const hint = document.getElementById('photo-hint');

      count.textContent = photos.length;
      empty.style.display = photos.length === 0 ? 'block' : 'none';
      hint.textContent = photos.length > 0 ? '메타데이터 원본 보존됨' : '사진을 등록해주세요';

      list.innerHTML = photos.map(p => {
        const hasAnno = p.annotation !== null;
        const arrowOnlyHtml = hasAnno ? `
          <div class="photo-annotation-overlay">
            <span class="annotation-arrow" style="left:${p.annotation.x}%;top:${p.annotation.y}%;">&#10148;</span>
          </div>
        ` : '';

        const annoCommentHtml = hasAnno ? `
          <div class="annotation-comment">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg>
            <span>${p.annotation.text}</span>
          </div>
        ` : '';

        return `
        <div class="photo-card">
          <div class="photo-card-img">
            <div class="photo-placeholder-img" style="background:${p.color};">
              <span style="font-size:1rem; color:rgba(0,0,0,0.3);">${p.label}</span>
            </div>
            ${arrowOnlyHtml}
            <div class="photo-timestamp">
              <div class="photo-timestamp-line">
                <span>${p.timestamp}</span>
                <span>LTI Certified</span>
              </div>
              <div class="photo-timestamp-line">
                <span>${p.gps}</span>
                <span>${p.source === 'auto' ? 'Auto-Copy' : p.source === 'camera' ? 'Tablet' : 'Import'}</span>
              </div>
            </div>
            <button class="photo-annotate-btn ${hasAnno ? 'has-annotation' : ''}" onclick="openAnnotateModal(${p.id})">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg>
              ${hasAnno ? '표시됨' : '화살표 표시'}
            </button>
          </div>
          <div class="photo-card-body">
            ${annoCommentHtml}
            <textarea class="photo-comment-input" rows="2"
              placeholder="이 사진에 대한 설명을 입력하세요 (예: 화장실 천장 누수로 인한 곰팡이 발생)"
              oninput="updateComment(${p.id}, this.value)">${p.comment}</textarea>
          </div>
          <div class="photo-card-footer">
            <span class="photo-meta">${p.timestamp} · ${p.source === 'auto' ? '📋 기존 현장에서 복사' : p.source === 'camera' ? '태블릿 촬영' : '외부 파일'}</span>
            <button class="photo-delete-btn" onclick="deletePhoto(${p.id})">삭제</button>
          </div>
        </div>
        `;
      }).join('');
    }

    // ===== 화살표 주석 모달 =====
    let annotateTarget = null;

    function openAnnotateModal(photoId) {
      annotateTarget = photos.find(p => p.id === photoId);
      if (!annotateTarget) return;

      const modal = document.createElement('div');
      modal.className = 'annotate-modal';
      modal.id = 'modal-annotate';
      modal.innerHTML = `
        <div class="annotate-header">
          <span class="annotate-header-title">화살표 표시 (옵션)</span>
          <button class="annotate-close" onclick="closeAnnotateModal()">&times;</button>
        </div>
        <div class="annotate-canvas" id="annotate-canvas" onclick="placeArrow(event)">
          <div style="width:100%;height:100%;background:${annotateTarget.color};border-radius:8px;display:flex;align-items:center;justify-content:center;">
            <span style="color:rgba(0,0,0,0.3);font-size:1rem;">${annotateTarget.label}</span>
          </div>
          <div class="annotate-hint">사진에서 지시할 부분을 터치하세요</div>
          <div id="annotate-preview-arrow" style="display:none;">
            <span class="annotation-arrow" id="anno-arrow" style="position:absolute;">&#10148;</span>
          </div>
        </div>
        <div class="annotate-bottom">
          <div class="annotate-comment-row">
            <input class="annotate-comment-input" id="annotate-text" type="text"
              placeholder="이 부분에 대한 설명 (예: 누수 원인 지점)"
              value="${annotateTarget.annotation ? annotateTarget.annotation.text : ''}">
            <button class="annotate-save-btn" onclick="saveAnnotation()">저장</button>
          </div>
          ${annotateTarget.annotation ? '<button style="background:none;border:none;color:#ff6b6b;font-size:0.8125rem;margin-top:10px;cursor:pointer;padding:4px 0;" onclick="removeAnnotation()">화살표 표시 제거</button>' : ''}
        </div>
      `;
      document.body.appendChild(modal);

      if (annotateTarget.annotation) {
        const arrow = document.getElementById('anno-arrow');
        arrow.style.left = annotateTarget.annotation.x + '%';
        arrow.style.top = annotateTarget.annotation.y + '%';
        arrow.parentElement.style.display = 'block';
      }
    }

    let arrowPos = null;
    function placeArrow(e) {
      const canvas = document.getElementById('annotate-canvas');
      const rect = canvas.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
      const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
      arrowPos = { x: parseFloat(x), y: parseFloat(y) };

      const arrow = document.getElementById('anno-arrow');
      arrow.style.left = x + '%';
      arrow.style.top = y + '%';
      arrow.parentElement.style.display = 'block';

      const hint = document.querySelector('.annotate-hint');
      if (hint) hint.style.display = 'none';
    }

    function saveAnnotation() {
      const text = document.getElementById('annotate-text').value.trim();
      if (!arrowPos && !annotateTarget.annotation) {
        LTI.toast('사진에서 지시할 부분을 터치해주세요');
        return;
      }
      if (!text) {
        LTI.toast('설명을 입력해주세요');
        return;
      }
      const pos = arrowPos || annotateTarget.annotation;
      annotateTarget.annotation = { x: pos.x, y: pos.y, text: text };
      closeAnnotateModal();
      renderPhotos();
      LTI.toast('화살표 표시가 저장되었습니다');
    }

    function removeAnnotation() {
      annotateTarget.annotation = null;
      arrowPos = null;
      closeAnnotateModal();
      renderPhotos();
      LTI.toast('화살표 표시가 제거되었습니다');
    }

    function closeAnnotateModal() {
      const modal = document.getElementById('modal-annotate');
      if (modal) modal.remove();
      arrowPos = null;
    }

    // 초기 렌더링 — 자동 복사된 사진 즉시 표시
    document.addEventListener('DOMContentLoaded', function() {
      renderPhotos();
    });
    // fallback: DOMContentLoaded 이미 지난 경우
    if (document.readyState !== 'loading') {
      renderPhotos();
    }
  </script>
</body>
</html>
